name: Desktop release (Windows + macOS)

# The #1 guarantee: a build that doesn't actually launch can NEVER be published.
# Each gate is a separate step; GitHub Actions stops the job on the first failure, so the installer
# (Gate 5) and publish (Gate 6) are only reachable after the BOOT SELF-TEST (Gate 4) is green.
on:
  workflow_dispatch: {}
  push:
    tags: ["v*"]

permissions:
  contents: write           # needed for Gate 6 release publishing on a tag

jobs:
  build:
    runs-on: windows-latest
    env:
      APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('0.0.{0}', github.run_number) }}
      SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}   # optional; Slack step is skipped if unset
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"            # PINNED — not 3.12 (PyInstaller breakage)

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt

      - name: Stamp build version (shown in the app's header / About)
        shell: pwsh
        run: "$env:APP_VERSION | Out-File -FilePath version.txt -Encoding ascii -NoNewline"

      # ---------- GATE 1: logic tests (before anything is frozen) ----------
      - name: "Gate 1 — pytest (logic)"
        run: python -m pytest tests/test_smoke.py -q

      # ---------- GATE 2: dependency-completeness on a clean env ----------
      - name: "Gate 2 — dependency completeness (clean-env import scan)"
        run: python -m pytest tests/test_deps_complete.py -q

      # ---------- GATE 3: build the .exe ----------
      - name: "Gate 3 — PyInstaller build"
        run: pyinstaller --clean --noconfirm build/PRF_Review.spec

      # ---------- GATE 4: BOOT SELF-TEST (the hard guarantee) ----------
      - name: "Gate 4 — BOOT SELF-TEST (launch the .exe, poll /health, fail if DOA)"
        env:
          PRF_EXE: dist/PRF Review.exe
        run: python -m pytest -m boot tests/test_boot_exe.py -q -s

      # ---------- GATE 5: installer (only reachable if Gate 4 passed) ----------
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: "Gate 5 — Inno Setup installer"
        shell: cmd
        run: '"%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" installer\PRF_Review.iss'

      # ---------- GATE 6: publish (only reachable if every prior gate passed) ----------
      - name: "Gate 6 — Upload installer artifact"
        uses: actions/upload-artifact@v4
        with:
          name: PRF-Review-Setup
          path: installer/installer_out/*.exe
          if-no-files-found: error

      # The permanent delivery link: ONE rolling tag whose assets CI overwrites every green build.
      # URL techs bookmark:  https://github.com/<owner>/<repo>/releases/download/windows-build/PRF-Review-Setup.exe
      - name: "Gate 6 — Publish to permanent rolling release (windows-build)"
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $setup = Get-ChildItem "installer/installer_out/*.exe" | Select-Object -First 1
          Copy-Item $setup.FullName "PRF-Review-Setup.exe" -Force         # fixed name -> stable URL
          Compress-Archive -Path "dist/PRF Review.exe" -DestinationPath "PRF-Review-Windows.zip" -Force
          $notes = "Latest verified build (#$env:GITHUB_RUN_NUMBER) — always the newest build that passed the boot self-test."
          gh release view windows-build *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create windows-build --title "PRF Review — Windows desktop build" --notes "$notes"
          } else {
            gh release edit windows-build --notes "$notes"
          }
          gh release upload windows-build "PRF-Review-Setup.exe" "PRF-Review-Windows.zip" --clobber

      # ---------- optional: surface field/CI failures in one Slack channel ----------
      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK != ''
        shell: bash
        run: |
          # Scrubbed: only workflow/run metadata — no file paths, no PII.
          payload=$(printf '{"text":":x: PRF Review build FAILED at a gate on `%s` (run #%s). See: %s"}' \
            "${{ github.ref_name }}" "${{ github.run_number }}" \
            "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
          curl -sf -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK" || true

  # macOS build — same DOA-never-publishes guarantee. Publishes a Mac download to its own rolling tag.
  mac:
    runs-on: macos-latest          # Apple Silicon — matches a Mac Studio (arm64)
    env:
      APP_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('0.0.{0}', github.run_number) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-desktop.txt
      - name: Stamp build version
        run: printf '%s' "$APP_VERSION" > version.txt

      - name: "Gate 1 — pytest (logic)"
        run: python -m pytest tests/test_smoke.py -q
      - name: "Gate 2 — dependency completeness (clean-env import scan)"
        run: python -m pytest tests/test_deps_complete.py -q

      - name: "Gate 3 — PyInstaller build (.app)"
        run: pyinstaller --clean --noconfirm build/PRF_Review_mac.spec

      - name: "Gate 4 — BOOT SELF-TEST (launch the .app, poll /health, fail if DOA)"
        env:
          PRF_EXE: dist/PRF Review.app/Contents/MacOS/PRF Review
        run: python -m pytest -m boot tests/test_boot_exe.py -q -s

      - name: "Gate 5 — package the .app into a downloadable zip"
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent "PRF Review.app" "PRF-Review-macOS.zip"

      # Permanent Mac link:  https://github.com/<owner>/<repo>/releases/download/mac-build/PRF-Review-macOS.zip
      - name: "Gate 6 — Publish to permanent rolling release (mac-build)"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Latest verified macOS build (#$GITHUB_RUN_NUMBER) — always the newest build that passed the boot self-test."
          if gh release view mac-build >/dev/null 2>&1; then
            gh release edit mac-build --notes "$notes"
          else
            gh release create mac-build --title "PRF Review — macOS desktop build" --notes "$notes"
          fi
          gh release upload mac-build "dist/PRF-Review-macOS.zip" --clobber
